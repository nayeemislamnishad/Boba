<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Data Entry - Google Sheets Integration</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --success: #10b981;
            --error: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 40px -8px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body {
            font-family: 'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
            background: linear-gradient(135deg,#e8edf5 0%,#dce3ed 30%,#eef2f7 60%,#e4e9f3 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content:'';position:fixed;top:-180px;right:-120px;width:500px;height:500px;
            background:radial-gradient(circle,rgba(79,70,229,0.08) 0%,transparent 70%);
            border-radius:50%;pointer-events:none;z-index:0;animation:floatOrb 12s ease-in-out infinite;
        }
        body::after {
            content:'';position:fixed;bottom:-200px;left:-150px;width:550px;height:550px;
            background:radial-gradient(circle,rgba(99,102,241,0.06) 0%,transparent 70%);
            border-radius:50%;pointer-events:none;z-index:0;animation:floatOrb 15s ease-in-out infinite reverse;
        }
        @keyframes floatOrb {
            0%,100%{transform:translate(0,0) scale(1);}
            25%{transform:translate(40px,-30px) scale(1.08);}
            50%{transform:translate(-20px,25px) scale(0.94);}
            75%{transform:translate(-35px,-20px) scale(1.05);}
        }
        .container{position:relative;z-index:1;width:100%;max-width:500px;}
        .card {
            background:var(--card-bg);border-radius:var(--radius);padding:40px 36px;
            box-shadow:var(--shadow-lg);border:1px solid rgba(255,255,255,0.6);
            backdrop-filter:blur(4px);transition:var(--transition);
        }
        .card:hover{box-shadow:0 25px 50px -10px rgba(0,0,0,0.18);}
        .header{text-align:center;margin-bottom:32px;}
        .icon-wrapper {
            display:inline-flex;align-items:center;justify-content:center;
            width:56px;height:56px;border-radius:16px;
            background:linear-gradient(135deg,#eef2ff 0%,#e0e7ff 100%);
            margin-bottom:16px;box-shadow:0 4px 12px rgba(79,70,229,0.15);
        }
        .icon-wrapper svg{width:28px;height:28px;color:var(--primary);stroke-width:2;}
        .header h1{font-size:1.6rem;font-weight:700;color:var(--text);letter-spacing:-0.02em;margin-bottom:6px;}
        .header p{font-size:0.9rem;color:var(--text-light);font-weight:400;}
        .google-badge {
            display:inline-flex;align-items:center;gap:6px;background:#f1f5f9;
            padding:6px 14px;border-radius:20px;font-size:0.78rem;color:#475569;margin-top:10px;font-weight:500;
        }
        .google-badge .dot{width:7px;height:7px;border-radius:50%;background:#34a853;animation:pulse-dot 2s infinite;}
        @keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(52,168,83,0.5);}50%{box-shadow:0 0 0 10px rgba(52,168,83,0);}}
        .form-group{margin-bottom:20px;position:relative;}
        .form-group label{display:block;font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:7px;letter-spacing:0.01em;}
        .form-group label .required{color:var(--error);margin-left:2px;}
        .input-wrapper{position:relative;}
        .input-wrapper .input-icon {
            position:absolute;left:14px;top:50%;transform:translateY(-50%);
            color:#94a3b8;pointer-events:none;transition:var(--transition);width:18px;height:18px;
        }
        .form-group input, .form-group select {
            width:100%;padding:13px 14px 13px 44px;font-size:0.95rem;font-family:inherit;
            border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--input-bg);
            color:var(--text);transition:var(--transition);outline:none;letter-spacing:0.01em;
            appearance:none;-webkit-appearance:none;
        }
        .form-group select{cursor:pointer;padding-right:40px;}
        .form-group select option{padding:8px;}
        .form-group select option[value=""]{color:#b0bcc9;}
        .form-group input::placeholder{color:#b0bcc9;font-weight:400;}
        .form-group input:focus,.form-group select:focus {
            border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(79,70,229,0.08);
        }
        .input-wrapper:focus-within .input-icon{color:var(--primary);}

        /* Custom select arrow */
        .select-arrow {
            position:absolute;right:14px;top:50%;transform:translateY(-50%);
            pointer-events:none;color:#94a3b8;transition:var(--transition);
        }
        .input-wrapper:focus-within .select-arrow{color:var(--primary);}

        /* Student badge shown after selection */
        .student-badge {
            display:none;align-items:center;gap:8px;margin-top:8px;
            background:#eef2ff;border:1px solid #c7d2fe;border-radius:8px;
            padding:8px 12px;font-size:0.82rem;color:#4338ca;font-weight:600;
        }
        .student-badge.show{display:flex;}
        .student-badge .avatar {
            width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#818cf8);
            display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.75rem;font-weight:700;flex-shrink:0;
        }

        /* Duplicate warning */
        .duplicate-warning {
            display:none;align-items:center;gap:8px;margin-top:8px;
            background:#fff1f2;border:1px solid #fecdd3;border-radius:8px;
            padding:8px 12px;font-size:0.82rem;color:#be123c;font-weight:600;
        }
        .duplicate-warning.show{display:flex;}

        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        @media(max-width:480px){
            .form-row{grid-template-columns:1fr;}
            .card{padding:28px 20px;border-radius:12px;}
            .header h1{font-size:1.35rem;}
        }
        .submit-btn {
            width:100%;padding:14px 20px;font-size:1rem;font-weight:600;font-family:inherit;
            background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);
            cursor:pointer;transition:var(--transition);letter-spacing:0.01em;
            display:flex;align-items:center;justify-content:center;gap:8px;
            margin-top:8px;position:relative;overflow:hidden;
        }
        .submit-btn:hover{background:var(--primary-hover);transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,70,229,0.3);}
        .submit-btn:active{transform:translateY(0);box-shadow:0 4px 12px rgba(79,70,229,0.2);transition:0.1s;}
        .submit-btn:disabled{background:#a5b4fc;cursor:not-allowed;transform:none;box-shadow:none;}
        .submit-btn .spinner{display:none;width:20px;height:20px;border:2.5px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;}
        .submit-btn.loading .spinner{display:block;}
        .submit-btn.loading .btn-text{display:none;}
        .submit-btn.loading .btn-icon{display:none;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .toast {
            position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-120px);
            z-index:1000;padding:14px 24px;border-radius:30px;font-weight:600;font-size:0.9rem;
            letter-spacing:0.01em;color:#fff;box-shadow:0 12px 30px rgba(0,0,0,0.2);
            transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            pointer-events:none;display:flex;align-items:center;gap:8px;white-space:nowrap;
        }
        .toast.show{transform:translateX(-50%) translateY(0);}
        .toast.success{background:#059669;}
        .toast.error{background:#dc2626;}
        .entry-counter{text-align:center;font-size:0.8rem;color:var(--text-light);margin-top:20px;font-weight:500;}
        .entry-counter span{background:#eef2ff;padding:3px 10px;border-radius:12px;color:var(--primary);font-weight:700;}
    </style>
</head>
<body>
    <div class="toast" id="toast">
        <span id="toastIcon">✓</span>
        <span id="toastMsg"></span>
    </div>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3" ry="3"/>
                        <line x1="9" y1="9" x2="15" y2="9"/>
                        <line x1="9" y1="13" x2="15" y2="13"/>
                        <line x1="9" y1="17" x2="12" y2="17"/>
                    </svg>
                </div>
                <h1>Student Data Entry</h1>
                <p>Fill in the details below to save to Google Sheets</p>
                <div class="google-badge">
                    <span class="dot"></span> Connected to Google Spreadsheet
                </div>
            </div>

            <form id="studentForm" novalidate>

                <!-- Feature 1: Name Selector -->
                <div class="form-group">
                    <label for="name">Student Name <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <select id="name" required>
                            <option value="">— Select your name —</option>
                            <option value="Nayeem Islam Nishad">1. Nayeem Islam Nishad</option>
                            <option value="Kawser Ahmed">2. Kawser Ahmed</option>
                            <option value="Siddat Raj">3. Siddat Raj</option>
                        </select>
                        <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </div>
                    <!-- Shows selected student card -->
                    <div class="student-badge" id="studentBadge">
                        <div class="avatar" id="studentAvatar"></div>
                        <span id="studentBadgeText"></span>
                    </div>
                    <!-- Feature 2: Duplicate warning -->
                    <div class="duplicate-warning" id="duplicateWarning">
                        🚫 <span id="duplicateMsg"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="university">University <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10v6M2 10l10-7 10 7-10 7z"/>
                            <path d="M6 12v5c0 1.1 2.7 2 6 2s6-.9 6-2v-5"/>
                        </svg>
                        <input type="text" id="university" placeholder="e.g. Harvard University" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="registration">Registration <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="16" rx="2"/>
                                <line x1="7" y1="8" x2="17" y2="8"/>
                                <line x1="7" y1="12" x2="17" y2="12"/>
                                <line x1="7" y1="16" x2="13" y2="16"/>
                            </svg>
                            <input type="text" id="registration" placeholder="e.g. REG-2024-001" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="mark">Mark <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                            </svg>
                            <input type="number" id="mark" placeholder="e.g. 85" required min="0" max="100" step="0.01">
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    <span class="btn-text">Save to Google Sheets</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="entry-counter">
                📊 Entries submitted this session: <span id="entryCount">0</span>
            </div>
        </div>
    </div>

    <script>
    (function() {
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8PAWhDX6UEkd0cxhY2JdhV9fgv8Ipzk34RJ15nfRPorkLmYUwX9PTBCT383-hv0iHGQ/exec';

        // ── Feature 2: track submitted names THIS session ──
        const submittedThisSession = new Set();

        const form         = document.getElementById('studentForm');
        const submitBtn    = document.getElementById('submitBtn');
        const toast        = document.getElementById('toast');
        const toastMsg     = document.getElementById('toastMsg');
        const toastIcon    = document.getElementById('toastIcon');
        const entryCountEl = document.getElementById('entryCount');
        const nameSelect   = document.getElementById('name');
        const studentBadge = document.getElementById('studentBadge');
        const studentAvatar= document.getElementById('studentAvatar');
        const studentBadgeText = document.getElementById('studentBadgeText');
        const dupWarning   = document.getElementById('duplicateWarning');
        const dupMsg       = document.getElementById('duplicateMsg');

        let entryCount = 0, toastTimer = null;

        // ── Feature 1: show badge + check duplicate on name change ──
        nameSelect.addEventListener('change', function() {
            const val = this.value;
            dupWarning.classList.remove('show');

            if (!val) {
                studentBadge.classList.remove('show');
                submitBtn.disabled = false;
                return;
            }

            // Avatar initials
            const initials = val.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
            studentAvatar.textContent = initials;
            studentBadgeText.textContent = val + ' — selected ✓';
            studentBadge.classList.add('show');

            // Feature 2: check session duplicate immediately
            if (submittedThisSession.has(val)) {
                dupMsg.textContent = val + ' has already submitted. Only one attempt is allowed.';
                dupWarning.classList.add('show');
                studentBadge.classList.remove('show');
                submitBtn.disabled = true;
            } else {
                submitBtn.disabled = false;
            }
        });

        function showToast(msg, type='success') {
            if (toastTimer) clearTimeout(toastTimer);
            toast.className = 'toast ' + type;
            toastMsg.textContent = msg;
            toastIcon.textContent = type === 'success' ? '✓' : '✕';
            toast.offsetHeight;
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
        }

        function setLoading(on) {
            submitBtn.classList.toggle('loading', on);
            submitBtn.disabled = on;
        }

        async function checkAlreadySubmitted(name) {
            // Ask the Apps Script if this name exists in the sheet
            const url = GOOGLE_SCRIPT_URL + '?check=' + encodeURIComponent(name);
            try {
                const res = await fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } });
                if (!res.ok) return false;
                const ct = res.headers.get('content-type') || '';
                if (ct.includes('application/json')) {
                    const data = await res.json();
                    // Apps Script should return { exists: true/false }
                    return data.exists === true;
                }
            } catch (_) {}
            return false;
        }

        async function sendToGoogleSheets(data) {
            const fd = new URLSearchParams();
            fd.append('name',         data.name);
            fd.append('university',   data.university);
            fd.append('registration', data.registration);
            fd.append('mark',         data.mark);
            fd.append('timestamp',    new Date().toISOString());

            const res = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: fd,
                headers: { 'Accept': 'application/json' }
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const ct = res.headers.get('content-type') || '';
            return ct.includes('application/json') ? await res.json() : { raw: await res.text() };
        }

        function validateMark(v) {
            const n = parseFloat(v);
            return !isNaN(n) && n >= 0 && n <= 100;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const name         = nameSelect.value.trim();
            const university   = document.getElementById('university').value.trim();
            const registration = document.getElementById('registration').value.trim();
            const mark         = document.getElementById('mark').value.trim();

            if (!name || !university || !registration || mark === '') {
                showToast('Please fill in all required fields.', 'error'); return;
            }
            if (!validateMark(mark)) {
                showToast('Mark must be a number between 0 and 100.', 'error');
                document.getElementById('mark').focus(); return;
            }

            // ── Feature 2: session-level duplicate block ──
            if (submittedThisSession.has(name)) {
                dupMsg.textContent = name + ' has already submitted. Only one attempt is allowed.';
                dupWarning.classList.add('show');
                studentBadge.classList.remove('show');
                submitBtn.disabled = true;
                showToast('🚫 ' + name + ' already submitted!', 'error');
                return;
            }

            setLoading(true);
            try {
                // ── Feature 2: server-level duplicate check ──
                const alreadyInSheet = await checkAlreadySubmitted(name);
                if (alreadyInSheet) {
                    submittedThisSession.add(name); // sync session
                    dupMsg.textContent = name + ' has already submitted. Only one attempt is allowed.';
                    dupWarning.classList.add('show');
                    studentBadge.classList.remove('show');
                    submitBtn.disabled = true;
                    showToast('🚫 ' + name + ' already has a submission!', 'error');
                    setLoading(false);
                    return;
                }

                await sendToGoogleSheets({ name, university, registration, mark: parseFloat(mark).toFixed(2) });

                // Mark as submitted in session
                submittedThisSession.add(name);

                entryCount++;
                entryCountEl.textContent = entryCount;
                entryCountEl.style.transform = 'scale(1.3)';
                setTimeout(() => entryCountEl.style.transform = 'scale(1)', 300);

                showToast('✅ Successfully saved to Google Sheets!', 'success');
                form.reset();
                studentBadge.classList.remove('show');
                dupWarning.classList.remove('show');
                submitBtn.disabled = false;
                nameSelect.focus();

            } catch (err) {
                console.error(err);
                showToast('❌ Failed to save. Check console or Apps Script deployment.', 'error');
            } finally {
                setLoading(false);
            }
        });

        document.getElementById('mark').addEventListener('input', function() {
            const v = parseFloat(this.value);
            const bad = this.value !== '' && (isNaN(v) || v < 0 || v > 100);
            this.style.borderColor  = bad ? '#ef4444' : '';
            this.style.boxShadow    = bad ? '0 0 0 4px rgba(239,68,68,0.08)' : '';
        });

        nameSelect.focus();
    })();
    </script>
</body>
</html>
